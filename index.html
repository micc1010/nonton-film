<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieStation - Telegram Cloud</title>
    <style>
        :root {
            --primary: #0088cc; /* Warna khas Telegram */
            --primary-hover: #0077b5;
            --bg-dark: #0f1016;
            --card-bg: #1a1c29;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
            --adsterra-color: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }

        header {
            background-color: rgba(15, 16, 22, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        .search-container { position: relative; width: 300px; }
        .search-container input {
            width: 100%; padding: 10px 15px; background: #222533;
            border: 1px solid #33384f; border-radius: 20px; color: white; outline: none;
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Slot Iklan Banner */
        .ad-space {
            width: 100%; min-height: 90px; background: #222; margin-bottom: 30px;
            display: flex; align-items: center; justify-content: center;
            color: #555; border-radius: 8px; border: 1px dashed #444;
        }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-poster { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 15px; }

        /* Halaman Detail Film */
        .player-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c10; z-index: 2000; padding: 20px; overflow-y: auto; }
        .player-content { max-width: 600px; margin: 50px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .btn-back { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; float: left; }
        .btn-back:hover { background: #555; }

        .detail-poster { width: 100%; max-width: 250px; height: auto; border-radius: 8px; margin: 20px auto; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .btn-action { display: block; width: 100%; padding: 15px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; font-size: 16px; transition: 0.3s; cursor: pointer; }
        .btn-action:hover { background: var(--primary-hover); }

        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

    <header>
        <h1>MovieStation</h1>
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Cari film gratis...">
        </div>
    </header>

    <div class="container" id="mainMenu">
        <!-- Slot Iklan Banner Atas (Adsterra) -->
        <div class="ad-space">
            <!-- PASTE SCRIPT BANNER ADSTERRA 728x90 DI SINI -->
            Tempat Iklan Banner Adsterra
        </div>

        <h2 style="margin-bottom: 20px;" id="sectionTitle">Katalog Film Telegram</h2>
        <div class="movie-grid" id="movieList"></div>
    </div>

    <!-- Halaman Detail & Link Telegram -->
    <div id="playerPage" class="player-page">
        <div class="player-content clearfix">
            <button class="btn-back" onclick="closePlayer()">← Kembali</button>
            
            <img id="playerPoster" src="" class="detail-poster" alt="Poster">
            
            <h2 id="playerTitle">Judul Film</h2>
            <p id="playerDesc" style="color: #a4b0be; margin: 15px 0; line-height: 1.6; font-size: 14px;"></p>
            
            <!-- Tombol Pengalihan: Buka Iklan Baru Buka Telegram -->
            <button id="telegramBtn" class="btn-action">🔹 Nonton & Download via Telegram</button>
        </div>
    </div>

    <script>
        // DATA FILM TELEGRAM - Anda tinggal edit daftar ini saja jika ingin ganti film
        const movies = [
            {
                id: 1,
                title: "Big Buck Bunny (Uji Coba)",
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",
                desc: "Klik tombol di bawah ini untuk langsung diarahkan ke channel Telegram resmi kami dan mengunduh atau menonton film dengan kualitas HD penuh gratis tanpa buffering.",
                telegramUrl: "https://t.me/bukan_link_asli_ganti_dengan_link_pesan_telegram_anda", // LINK POSTINGAN TELEGRAM ANDA
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA UNTUK CARI CUAN
            },
            {
                id: 2,
                title: "Sintel (Uji Coba 2)",
                poster: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500",
                desc: "Petualangan seru seorang gadis pengembara. File video sudah siap di dalam cloud Telegram.",
                telegramUrl: "https://t.me/bukan_link_asli_ganti_dengan_link_pesan_telegram_anda", // LINK POSTINGAN TELEGRAM ANDA
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA UNTUK CARI CUAN
            }
        ];

        function displayMovies(data) {
            const list = document.getElementById('movieList');
            list.innerHTML = data.map(m => `
                <div class="movie-card" onclick="openPlayer(${m.id})">
                    <img src="${m.poster}" class="movie-poster">
                    <div class="movie-info">
                        <div style="font-weight:bold; font-size: 15px;">${m.title}</div>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:5px;">🔵 Tersedia di Telegram</div>
                    </div>
                </div>
            `).join('');
        }

        function openPlayer(id) {
            const movie = movies.find(m => m.id === id);
            
            document.getElementById('playerTitle').innerText = movie.title;
            document.getElementById('playerDesc').innerText = movie.desc;
            document.getElementById('playerPoster').src = movie.poster;
            
            const teleBtn = document.getElementById('telegramBtn');

            // Trik Monetisasi Maksimal:
            // Ketika tombol diklik, tab baru akan membuka Iklan Adsterra (Cuan masuk ke Anda).
            // Di saat yang sama, halaman ini akan otomatis dialihkan membuka aplikasi Telegram menuju film tersebut.
            teleBtn.onclick = function() {
                window.open(movie.direct, '_blank'); // Buka Iklan Adsterra Anda di tab baru
                
                setTimeout(() => {
                    window.location.href = movie.telegramUrl; // Buka link Telegram di halaman ini
                }, 400);
            };

            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('playerPage').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closePlayer() {
            document.getElementById('playerPage').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function searchMovie() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            displayMovies(movies.filter(m => m.title.toLowerCase().includes(q)));
        }

        displayMovies(movies);
    </script>
</body>
</html>
