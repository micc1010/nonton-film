<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieStation - Streaming & Download</title>
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f1016;
            --card-bg: #1a1c29;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }

        /* Header & Kolom Pencarian */
        header {
            background-color: rgba(15, 16, 22, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px;
            background: #222533;
            border: 1px solid #33384f;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(229, 9, 20, 0.5);
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Area Iklan */
        .ad-space {
            width: 100%;
            min-height: 90px;
            background: #222;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            border-radius: 8px;
            border: 1px dashed #444;
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-poster { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 15px; }
        .movie-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .movie-meta { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }

        /* Halaman Nonton / Player Overlay */
        .player-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .player-content {
            max-width: 900px;
            margin: 20px auto;
        }

        /* Tombol Kembali */
        .btn-back {
            display: inline-flex;
            align-items: center;
            background: #222;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-back:hover {
            background: var(--primary);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #111;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .btn-action {
            display: inline-block;
            padding: 12px 25px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-download { background: #2ed573; margin-left: 10px; }
        .btn-download:hover { background: #26af5f; }
        .btn-action:hover:not(.btn-download) { background: #ff1e2b; }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 50px 0;
        }

        footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; margin-top: 50px; }
    </style>
</head>
<body>

    <!-- Header dengan Fitur Pencarian -->
    <header>
        <h1>MovieStation</h1>
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Cari film di sini...">
        </div>
    </header>

    <div class="container" id="mainMenu">
        <!-- Slot Iklan Banner Atas (Adsterra) -->
        <div class="ad-space">
            <!-- PASTE SCRIPT BANNER ADSTERRA DISINI -->
            Iklan Banner 728x90
        </div>

        <h2 style="margin-bottom: 20px;" id="sectionTitle">Film Terbaru</h2>
        
        <!-- Daftar Grid Film -->
        <div class="movie-grid" id="movieList">
            <!-- Film akan diisi otomatis lewat JavaScript -->
        </div>
    </div>

    <!-- Halaman Nonton Film (Muncul Fullscreen saat film diklik) -->
    <div id="playerPage" class="player-page">
        <div class="player-content">
            <!-- Tombol Kembali ke Menu Utama -->
            <button class="btn-back" onclick="closePlayer()">← Kembali ke Menu Utama</button>
            
            <div class="video-container">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
            
            <h2 id="playerTitle">Judul Film</h2>
            <p id="playerDesc" style="color: #a4b0be; margin: 15px 0; line-height: 1.6;"></p>
            
            <!-- Tombol Monetisasi Adsterra -->
            <a href="#" id="watchLink" target="_blank" class="btn-action">Tonton Full Screen</a>
            <a href="#" id="downloadLink" target="_blank" class="btn-action btn-download">Download HD</a>
        </div>
    </div>

    <footer>
        &copy; 2026 MovieStation - Nonton Film Gratis Online
    </footer>

    <script>
        // DATA FILM - Tambah/Kurangi Film di Sini
        const movies = [
            {
                id: 1,
                title: "Big Buck Bunny (Animation)",
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",
                desc: "Kisah petualangan kelinci raksasa yang ramah melawan sekelompok tupai usil pengacau hutan.",
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ", // Link Embed Pemutar
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA
            },
            {
                id: 2,
                title: "Sintel (Fantasy Drama)",
                poster: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500",
                desc: "Perjalanan emosional seorang gadis pengembara bernama Sintel yang mencari naga kecil peliharaannya yang diculik.",
                video: "https://www.youtube.com/embed/eRsGyueVLvQ", // Link Embed Pemutar
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA
            },
            {
                id: 3,
                title: "Squid Game (Netflix Original)",
                poster: "https://images.unsplash.com/photo-1627856013091-fed6e4e30025?w=500", // Contoh poster
                desc: "Ratusan pemain yang membutuhkan uang menerima undangan aneh untuk bertanding dalam permainan anak-anak.",
                video: "", // Dikosongkan karena tidak bisa di-embed
                direct: "https://link-adsterra-anda.com", // Iklan Adsterra Anda
                originalLink: "https://www.netflix.com/title/81040344" // Link film di Netflix
            }
        ];

        // Fungsi Menampilkan Film di Halaman Utama
        function displayMovies(moviesToRender) {
            const listContainer = document.getElementById('movieList');
            if(moviesToRender.length === 0) {
                listContainer.innerHTML = `<div class="no-results">Film yang Anda cari tidak ditemukan.</div>`;
                return;
            }

            listContainer.innerHTML = moviesToRender.map(movie => `
                <div class="movie-card" onclick="openPlayer(${movie.id})">
                    <img src="${movie.poster}" class="movie-poster" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">
                            <span>2026</span>
                            <span style="color: #f1c40f;">★ 8.7</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Fitur Pencarian Langsung (Live Search)
        function searchMovie() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredMovies = movies.filter(movie => movie.title.toLowerCase().includes(query));
            displayMovies(filteredMovies);
            
            const titleElement = document.getElementById('sectionTitle');
            titleElement.innerText = query ? `Hasil Pencarian: "${query}"` : "Film Terbaru";
        }

        // Fungsi Buka Player Nonton Film
        function openPlayer(id) {
            const movie = movies.find(m => m.id === id);
            
            // Masukkan data film ke player halaman nonton
            document.getElementById('mainPlayer').src = movie.video;
            document.getElementById('playerTitle').innerText = movie.title;
            document.getElementById('playerDesc').innerText = movie.desc;
            
            // Hubungkan tombol aksi ke Direct Link Adsterra Anda
            document.getElementById('watchLink').href = movie.direct;
            document.getElementById('downloadLink').href = movie.direct;

            // Sembunyikan menu utama, tampilkan halaman nonton
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('playerPage').style.display = 'block';
            window.scrollTo(0,0);
        }

        // Fungsi Tombol Kembali ke Menu Utama
        function closePlayer() {
            // Matikan video iframe agar suaranya berhenti saat kembali
            document.getElementById('mainPlayer').src = '';

            // Tampilkan kembali menu utama, sembunyikan player
            document.getElementById('playerPage').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        // Jalankan website pertama kali
        displayMovies(movies);
    </script>
</body>
</html>
