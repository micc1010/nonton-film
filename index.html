<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieStation - Premium List</title>
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f1016;
            --card-bg: #1a1c29;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }

        header {
            background-color: rgba(15, 16, 22, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        .search-container { position: relative; width: 300px; }
        .search-container input {
            width: 100%; padding: 10px 15px; background: #222533;
            border: 1px solid #33384f; border-radius: 20px; color: white; outline: none;
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-poster { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 15px; }

        .player-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
        .player-content { max-width: 900px; margin: 20px auto; }

        .btn-back { background: #222; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .btn-back:hover { background: var(--primary); }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #111; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .btn-action { display: inline-block; padding: 12px 25px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .btn-netflix { background: #b9090b; } /* Warna khas Netflix */
        .btn-netflix:hover { background: #ff1e2b; }
    </style>
</head>
<body>

    <header>
        <h1>MovieStation</h1>
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Cari film Netflix / Bioskop...">
        </div>
    </header>

    <div class="container" id="mainMenu">
        <h2 style="margin-bottom: 20px;" id="sectionTitle">Katalog Film</h2>
        <div class="movie-grid" id="movieList"></div>
    </div>

    <!-- Player Page -->
    <div id="playerPage" class="player-page">
        <div class="player-content">
            <button class="btn-back" onclick="closePlayer()">← Kembali</button>
            
            <!-- Player Video (Otomatis sembunyi jika film tipe Netflix luar) -->
            <div class="video-container" id="videoWrapper">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
            
            <h2 id="playerTitle">Judul Film</h2>
            <p id="playerDesc" style="color: #a4b0be; margin: 15px 0;"></p>
            
            <!-- Tombol Iklan sekalian Link Pengalihan -->
            <a href="#" id="adsterraLink" target="_blank" class="btn-action btn-netflix">▶ Tonton Full Movie (di Netflix)</a>
        </div>
    </div>

    <script>
        const movies = [
            {
                id: 1,
                title: "Squid Game (Season 2)",
                poster: "https://images.unsplash.com/photo-1627856013091-fed6e4e30025?w=500",
                desc: "Kelanjutan kompetisi mematikan demi hadiah miliaran won. (Klik tombol di bawah untuk langsung menuju aplikasi Netflix resmi).",
                video: "", // Kosong karena langsung diarahkan keluar
                isNetflix: true,
                netflixUrl: "https://www.netflix.com/title/81040344", // Link Netflix Asli
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA DISINI
            },
            {
                id: 2,
                title: "Big Buck Bunny (Trailer)",
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",
                desc: "Contoh film bioskop biasa yang bisa diputar langsung di web.",
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                isNetflix: false,
                direct: "https://google.com" // MASUKKAN DIRECT LINK ADSTERRA ANDA DISINI
            }
        ];

        function displayMovies(data) {
            const list = document.getElementById('movieList');
            list.innerHTML = data.map(m => `
                <div class="movie-card" onclick="openPlayer(${m.id})">
                    <img src="${m.poster}" class="movie-poster">
                    <div class="movie-info">
                        <div style="font-weight:bold;">${m.title}</div>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:5px;">
                            ${m.isNetflix ? '🔴 Netflix Original' : '🎬 Player Web'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openPlayer(id) {
            const movie = movies.find(m => m.id === id);
            
            document.getElementById('playerTitle').innerText = movie.title;
            document.getElementById('playerDesc').innerText = movie.desc;
            
            const videoWrapper = document.getElementById('videoWrapper');
            const actionBtn = document.getElementById('adsterraLink');

            if (movie.isNetflix) {
                videoWrapper.style.display = 'none'; // Sembunyikan player kosong
                actionBtn.innerText = "▶ Buka & Nonton di Netflix";
                
                // TRIK: Saat diklik, tab iklan Adsterra terbuka, lalu halaman ini pindah ke Netflix
                actionBtn.onclick = function() {
                    window.open(movie.direct, '_blank'); // Buka Iklan Adsterra (Cuan!)
                    setTimeout(() => {
                        window.location.href = movie.netflixUrl; // Pindahkan user ke Netflix
                    }, 500);
                };
            } else {
                videoWrapper.style.display = 'block';
                document.getElementById('mainPlayer').src = movie.video;
                actionBtn.innerText = "▶ Tonton Full Screen (Iklan)";
                actionBtn.href = movie.direct;
                actionBtn.onclick = null;
            }

            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('playerPage').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('mainPlayer').src = '';
            document.getElementById('playerPage').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function searchMovie() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            displayMovies(movies.filter(m => m.title.toLowerCase().includes(q)));
        }

        displayMovies(movies);
    </script>
</body>
</html>
